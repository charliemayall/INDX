#####################################################################
#  INDX USER CONFIGURATION
#####################################################################
#
#  This is the ONLY file you need to edit to adapt INDX to your
#  machine. All other INDX config files derive their values from
#  the variables defined here.
#
#  HOW TO CONFIGURE TOOLS:
#    Set tool_count to the number of tools installed.
#    Then fill in one pair of variables per tool (tN_x, tN_dock_y).
#       x      — X coordinate centred on the tool holder (mm)
#       dock_y — Y coordinate where the tool is fully seated (mm)
#                (tools with larger bodies may need a more negative value)
#
#    Tool number = variable suffix.  t0 = T0, t1 = T1, etc.
#    Add or remove pairs and update tool_count — the system adapts automatically.
#
#  WHAT IS AUTO-DERIVED:
#    - Trigger Y per tool (dock_y + trigger_offset)
#
#  WHAT NOT TO TOUCH:
#    - E-axis moves and dance geometry are fixed hardware constants
#      defined in indx-tc-macros.cfg. These are determined by the
#      INDX mechanism and must not be changed.
#
#####################################################################

[gcode_macro TOOL_POSITIONS]
description: INDX tool positions (user-configurable)

# ── How many tools are installed ─────────────────────────────────────────────
variable_tool_count: 3

# ── Z-hop during toolchange ──────────────────────────────────────────────────
#  z_hop = distance (mm) to raise Z during the first XY toolchange move.
#          Non-blocking: Z rises while XY travel to the dock, and descends
#          while XY sprint back to clearance after pickup (one combined move).
#          Set to 0.0 to disable.
variable_z_hop: 1.0

# ── Z offset auto-calibration probe position ─────────────────────────────────
#  Used by CAL_Z_AUTO_ALL to probe each tool and calibrate Z offsets.
#
#  probe_x / probe_y  — centre of the probing area (machine coords, mm).
#                       Set to the centre of your bed. The macro will probe
#                       here for debris clearing, then +5 mm in X for the
#                       actual measurement.
#  probe_fuzz         — legacy fuzz radius, kept for compatibility (mm).
#  probe_z_clearance  — Z height (gcode space) the toolhead travels to before
#                       descending to probe. Must clear any bed features.
variable_probe_x:          -1.0   # set to bed centre X, or -1 to auto-detect
variable_probe_y:          -1.0   # set to bed centre Y, or -1 to auto-detect
variable_probe_fuzz:         2.0
variable_probe_z_clearance: 10.0

# ── Trigger offset ───────────────────────────────────────────────────────────
#  trigger_offset = distance (mm) from dock_y to the trigger line.
#                   trigger_y is auto-derived as: dock_y + trigger_offset
#                   Increase if the latch engages before the tool is fully seated;
#                   decrease if the toolhead overshoots the dock.
variable_trigger_offset: 5.0

# ── Safe lateral travel position ─────────────────────────────────────────────
#  clearance_y = Y coordinate where the toolhead clears ALL docked tools.
#                The toolhead moves here before any X travel between tools.
#                Set this to the Y position where no tool bodies are in the way.
variable_clearance_y: 0.0

# ── Per-tool positions ────────────────────────────────────────────────────────
#  x      = X coordinate of the tool holder centre (mm)
#  dock_y = Y coordinate where the tool is fully seated (mm)
#           A more negative value seats the tool deeper.
#
#  To add a tool:    add a new pair of lines and increment tool_count above.
#  To remove a tool: delete its pair of lines and decrement tool_count above.
#
variable_t0_x:       0.0
variable_t0_dock_y: -26
#
variable_t1_x:      43.70
variable_t1_dock_y: -26
#
variable_t2_x:      88.70
variable_t2_dock_y: -26
#
variable_t3_x:     102.0
variable_t3_dock_y: -26

# ── Assembled at startup from the variables above — do not edit ──────────────
variable_tools: []

gcode:

#####################################################################
#  TOOL SHORTCUT MACROS (T0–T3)
#####################################################################
#  Slicers send T0, T1, etc. to select tools. Each macro below
#  routes to CHANGE_TOOL, which validates the index against the
#  tools list above and errors cleanly if the tool doesn't exist.
#
#  If you have more than 4 tools, add more entries following the
#  same one-line pattern.
#####################################################################

[gcode_macro T0]
gcode: CHANGE_TOOL TOOL=0
[gcode_macro T1]
gcode: CHANGE_TOOL TOOL=1
[gcode_macro T2]
gcode: CHANGE_TOOL TOOL=2
[gcode_macro T3]
gcode: CHANGE_TOOL TOOL=3
