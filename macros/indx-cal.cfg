#####################################################################
#  INDX CALIBRATION MACROS
#####################################################################
#
#  This file contains all calibration workflows for the INDX system.
#  User-configurable values (probe position, tool count, etc.) live
#  in indx.cfg — nothing in this file needs editing.
#
#  CALIBRATION WORKFLOWS
#  ─────────────────────────────────────────────────────────────────
#  1. Dock position          CAL_SET_DOCK_Y
#                              Jog to the dock, run to get the value,
#                              paste into indx.cfg.
#                            CALIBRATE_DOCK_X TOOL=N
#                              Automated: disable motors, slide to dock,
#                              homes Y+X via INDX_DOCK_MEASURE and reports
#                              the absolute dock X to paste into indx.cfg.
#                            READ_DOCK_POSITION TOOL=N
#                              Already homed? Jog to the dock and read the
#                              current X directly.
#
#  2. XY tool offsets        CAL_01_SET_CAMERA_REF
#     (camera method)        CAL_02_PREP_TOOL_CAL TOOL=N
#                            CAL_03_SAVE_XY_OFFSET
#
#  3. Z auto-calibration     CAL_Z
#     (convergent + median)    Convergence window + median sampling.
#
#  4. Inspect / utilities    CAL_CHECK_OFFSETS
#                            RESET_GLOBAL_Z
#
#  5. Filament / heat cap.   LOAD_FILAMENT TOOL=N TYPE=<material>
#                              Pick up a tool, set the filament's heat
#                              capacity for the safety model, and
#                              load + prime it.
#
#  6. Load cell              CALIBRATE_LOAD_CELL, then
#     (before Z homing!)     CALIBRATE_LOAD_CELL_APPLY GRAMS=1600
#                              Calibrate the load cell (the Z probe)
#                              before Z homing. Homes X/Y; seat a tool
#                              by hand between the two steps.
#
#####################################################################


#####################################################################
#  1. DOCK POSITION CALIBRATION
#####################################################################

[gcode_macro CAL_SET_DOCK_Y]
description: Report the dock_y value for the active tool from current Y position — paste result into indx.cfg
gcode:
    {% set tp  = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set act = printer.save_variables.variables.active_tool|default(-1)|int %}
    {% if act >= 0 %}
        {% set new_dock_y = "%.3f"|format(printer.toolhead.position.y|float - tp.trigger_offset|float) %}
        RESPOND MSG="──────────────────────────────────────"
        RESPOND MSG="  T{act} dock_y = {new_dock_y}"
        RESPOND MSG="  Update indx.cfg:"
        RESPOND MSG="    variable_t{act}_dock_y: {new_dock_y}"
        RESPOND MSG="  Then RESTART to apply."
        RESPOND MSG="──────────────────────────────────────"
    {% else %}
        RESPOND TYPE=error MSG="No tool loaded. Pick up a tool first."
    {% endif %}


#####################################################################
#  2. XY TOOL OFFSET CALIBRATION (CAMERA METHOD)
#####################################################################
#
#  Step 1: Pick up T0, jog it so the nozzle tip is centred in your
#          camera crosshair, then run CAL_01_SET_CAMERA_REF.
#  Step 2: For each additional tool, run CAL_02_PREP_TOOL_CAL TOOL=N.
#          The tool is picked up and moved to the camera position.
#          Jog to re-centre it in the crosshair.
#  Step 3: Run CAL_03_SAVE_XY_OFFSET to save the offset and snap
#          back to verify alignment.
#
#####################################################################

[gcode_macro CAL_01_SET_CAMERA_REF]
description: Step 1 — Centre T0 in camera crosshair and save as reference point
gcode:
    {% set pos = printer.toolhead.position %}
    SAVE_VARIABLE VARIABLE=cam_pos_x VALUE='{"%.3f"|format(pos.x)}'
    SAVE_VARIABLE VARIABLE=cam_pos_y VALUE='{"%.3f"|format(pos.y)}'
    SAVE_VARIABLE VARIABLE=cam_pos_z VALUE='{"%.3f"|format(pos.z)}'
    RESPOND MSG="Camera reference saved at T0 position (X={'%.3f'|format(pos.x)} Y={'%.3f'|format(pos.y)} Z={'%.3f'|format(pos.z)})."

[gcode_macro CAL_02_PREP_TOOL_CAL]
description: Step 2 — Pick up tool N and move to camera position for alignment
gcode:
    {% set t = params.TOOL|default(-1)|int %}
    {% if t >= 0 %}
        CHANGE_TOOL TOOL={t} SKIP_Z_CORRECTION=1
        _CAL_LATCH_ENGAGE
        SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=1
        _CAL_GOTO_CAMPOS
        RESPOND MSG="Align T{t} in crosshair, then run CAL_03_SAVE_XY_OFFSET"
    {% else %}
        RESPOND TYPE=error MSG="Usage: CAL_02_PREP_TOOL_CAL TOOL=1"
    {% endif %}

[gcode_macro CAL_03_SAVE_XY_OFFSET]
description: Step 3 — Calculate XY offset from current position and save
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set act = svv.active_tool|default(-1)|int %}
    {% if act >= 0 %}
        {% set off_x = 0.0 if act == 0 else (printer.toolhead.position.x - svv.cam_pos_x|float) %}
        {% set off_y = 0.0 if act == 0 else (printer.toolhead.position.y - svv.cam_pos_y|float) %}
        SAVE_VARIABLE VARIABLE=t{act}_offset_x VALUE='{"%.3f"|format(off_x)}'
        SAVE_VARIABLE VARIABLE=t{act}_offset_y VALUE='{"%.3f"|format(off_y)}'
        SET_GCODE_OFFSET X={"%.3f"|format(off_x)} Y={"%.3f"|format(off_y)} MOVE=1
        RESPOND MSG="T{act} XY offset saved — X={'%.3f'|format(off_x)}  Y={'%.3f'|format(off_y)}"
    {% else %}
        RESPOND TYPE=error MSG="No tool loaded."
    {% endif %}

[gcode_macro _CAL_GOTO_CAMPOS]
description: Inner — move to saved camera reference position
gcode:
    {% set svv    = printer.save_variables.variables %}
    {% set safe_z = svv.cam_pos_z|default(10)|float + 5.0 %}
    G90
    {% if printer.toolhead.position.z < safe_z %}
        G0 Z{safe_z} F1500
    {% endif %}
    G0 X{svv.cam_pos_x|default(0)|float} Y{svv.cam_pos_y|default(0)|float} F8000
    G0 Z{svv.cam_pos_z|default(0)|float} F1500


#####################################################################
#  3. Z AUTO-CALIBRATION (CONVERGENT + MEDIAN)
#####################################################################
#
#  CAL_Z probes each tool in two phases:
#
#  Phase 1 — Convergence (with fuzzing):
#    Maintains a rolling window of the last 4 probe values. Once the
#    sample variance of that window is below (0.005 mm)² = 0.000025 mm²
#    convergence is declared. If 7 probes pass without convergence the
#    head moves to the next of 6 positions on a 3 mm radius circle
#    (within the 10 mm diameter boundary) and restarts the window.
#    After 2 fuzz moves probe speed drops to half to reduce contact
#    force and that slower speed is kept for the final samples too.
#
#  Phase 2 — Median sampling:
#    Once converged (or after max_probes), takes sample_count clean
#    probes at the same position and saves the median as the result.
#
#  Usage:
#    CAL_Z
#
#  Prerequisites:
#    - Printer homed (auto-homes if not)
#
#  Probe positions:
#    Probe location is chosen with probe_location (see below). For
#    edge positions the 10 mm diameter fuzz circle is inset from the
#    bed edge by edge_inset mm so the circle edge stays on the bed.
#
#    Initial probe  — per-tool debris-clearing spot, spread in X (or Y
#                     for left/right) from the clean zone so each tool
#                     contaminates a unique area.
#    Clean probe    — centre of the fuzz circle, same XY for all tools.
#
#  Configuration variables on CAL_Z:
#    probe_location  — "center" | "rear" | "front" | "left" | "right"
#    edge_inset      — mm from bed edge to the near edge of the fuzz
#                      circle (non-center positions only)
#    probe_speed     — normal probe speed (mm/s); halved after 2 fuzzes
#    sample_count    — final clean probes per tool for the median
#
#####################################################################

[gcode_macro CAL_Z]
description: Convergent Z probe (SD window + fuzzing) then median samples — saves Z offsets relative to T0
variable_probe_location:  "rear"   # "center" | "rear" | "front" | "left" | "right"
variable_edge_inset:         5.0   # mm from bed edge to near edge of fuzz circle
variable_probe_speed:        3.0   # normal probe speed mm/s (halved after 2 fuzz moves)
variable_probe_retract:      1.0   # Z retract between convergence/sample probes (mm, relative)
variable_toolchange_z:      20.0   # minimum Z before each CHANGE_TOOL (nozzle clearance, mm)
variable_sample_count:         5   # final clean probes per tool — median saved as result
gcode:
    {% set tp  = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro CAL_Z"] %}
    {% set n   = tp.tool_count|int %}
    {% set sc  = cfg.sample_count|int %}
    {% set spd = cfg.probe_speed|float %}
    {% set loc = cfg.probe_location %}
    {% set ins = cfg.edge_inset|float %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    SAVE_VARIABLE VARIABLE=v2z_total_tools  VALUE={n}
    SAVE_VARIABLE VARIABLE=v2z_current_tool VALUE=0

    # Compute clean probe centre from bed dimensions and probe_location
    {% set th  = printer.toolhead %}
    {% set bcx = (th.axis_minimum.x + th.axis_maximum.x) / 2 %}
    {% set bcy = (th.axis_minimum.y + th.axis_maximum.y) / 2 %}
    {% set r   = 5.0 %}
    {% set pns = namespace(cx=bcx, cy=bcy) %}
    {% if loc == "rear"  %}{% set pns.cy = th.axis_maximum.y - ins - r %}{% endif %}
    {% if loc == "front" %}{% set pns.cy = th.axis_minimum.y + ins + r %}{% endif %}
    {% if loc == "left"  %}{% set pns.cx = th.axis_minimum.x + ins + r %}{% endif %}
    {% if loc == "right" %}{% set pns.cx = th.axis_maximum.x - ins - r %}{% endif %}

    RESPOND MSG="═══════════════════════════════════════════════"
    RESPOND MSG="  CAL_Z — {n} tools"
    RESPOND MSG="  T0 reference offset: {svv.t0_offset_z|default(0.0)}"
    RESPOND MSG="  Location       {loc}  (inset {'%.1f'|format(ins)} mm)"
    RESPOND MSG="  Clean probe    X={'%.2f'|format(pns.cx)}  Y={'%.2f'|format(pns.cy)}"
    RESPOND MSG="  Convergence    SD < 0.005 mm over 4-sample window  (fuzz after 7)"
    RESPOND MSG="  Final samples  {sc} probes → median"
    RESPOND MSG="  Probe speed    {'%.1f'|format(spd)} mm/s  (→ {'%.1f'|format(spd/2)} after 2 fuzz moves)"
    RESPOND MSG="═══════════════════════════════════════════════"

    _CZ_NEXT_TOOL


#####################################################################
#  TOOL LOOP
#####################################################################

[gcode_macro _CZ_NEXT_TOOL]
description: Inner — pick up tool, debris-clear at per-tool spot, start convergence at clean spot
gcode:
    {% set svv   = printer.save_variables.variables %}
    {% set tp    = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set cfg   = printer["gcode_macro CAL_Z"] %}
    {% set i     = svv.v2z_current_tool|int %}
    {% set n     = svv.v2z_total_tools|int %}
    {% set z_clr = tp.probe_z_clearance|float %}
    {% set loc   = cfg.probe_location %}
    {% set ins   = cfg.edge_inset|float %}

    # Compute clean probe centre
    {% set th  = printer.toolhead %}
    {% set bcx = (th.axis_minimum.x + th.axis_maximum.x) / 2 %}
    {% set bcy = (th.axis_minimum.y + th.axis_maximum.y) / 2 %}
    {% set r   = 5.0 %}
    {% set pns = namespace(cx=bcx, cy=bcy) %}
    {% if loc == "rear"  %}{% set pns.cy = th.axis_maximum.y - ins - r %}{% endif %}
    {% if loc == "front" %}{% set pns.cy = th.axis_minimum.y + ins + r %}{% endif %}
    {% if loc == "left"  %}{% set pns.cx = th.axis_minimum.x + ins + r %}{% endif %}
    {% if loc == "right" %}{% set pns.cx = th.axis_maximum.x - ins - r %}{% endif %}
    {% set cx = pns.cx %}
    {% set cy = pns.cy %}

    # Per-tool debris-clearing spot: spread in X for centre/rear/front,
    # in -Y for left/right, so each tool contaminates a unique area
    # outside the shared clean measurement zone.
    {% set dns = namespace(ix=cx, iy=cy) %}
    {% if loc == "left" or loc == "right" %}
        {% set dns.iy = cy - (i + 2) * 5.0 %}
    {% else %}
        {% set dns.ix = cx - (i + 2) * 5.0 %}
    {% endif %}

    {% if i >= n %}
        _CZ_FINALIZE
    {% else %}
        RESPOND MSG="───────────────────────────────────────────────"
        RESPOND MSG="  T{i} — debris-clearing at X={'%.2f'|format(dns.ix)} Y={'%.2f'|format(dns.iy)}"

        # Lift to at least toolchange_z before the tool swap so parked nozzles
        # clear the bed. tc-macros only adds a small relative z_hop; at low Z
        # (post-probe) that is not enough.
        {% set tc_z = [printer.toolhead.position.z, cfg.toolchange_z|float]|max %}
        G90
        G0 Z{'%.3f'|format(tc_z)} F3000
        CHANGE_TOOL TOOL={i} SKIP_Z_CORRECTION=1
        _CAL_LATCH_ENGAGE
        G90
        G0 Z{z_clr} F1500
        G0 X{'%.3f'|format(dns.ix)} Y{'%.3f'|format(dns.iy)} F8000
        PROBE
        G0 Z{z_clr} F1500
        PROBE
        G0 Z{z_clr} F1500
        PROBE
        G0 Z{z_clr} F1500

        # Move to shared clean measurement spot
        G0 X{'%.3f'|format(cx)} Y{'%.3f'|format(cy)} F3000

        # Reset convergence state for this tool
        SAVE_VARIABLE VARIABLE=v2z_probe_count   VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_since_fuzz    VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_win_count     VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_win_pos       VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_fuzz_attempts VALUE=0

        RESPOND MSG="  T{i} — probing to convergence (SD < 0.005 mm, fuzz after 7)..."

        UPDATE_DELAYED_GCODE ID=_cz_probe_loop DURATION=0.1
    {% endif %}


#####################################################################
#  CONVERGENCE LOOP
#####################################################################

[gcode_macro _CZ_PROBE_STEP]
description: Inner — small relative retract, probe at current speed, hand off to _CZ_READ
gcode:
    {% set svv   = printer.save_variables.variables %}
    {% set cfg   = printer["gcode_macro CAL_Z"] %}
    {% set fa    = svv.v2z_fuzz_attempts|default(0)|int %}
    {% set spd   = cfg.probe_speed|float %}
    {% set actual_spd = spd / 2.0 if fa >= 2 else spd %}
    # Relative retract — safe regardless of where the probe left the head
    G91
    G0 Z{cfg.probe_retract} F1500
    G90
    PROBE PROBE_SPEED={actual_spd}
    _CZ_READ


[gcode_macro _CZ_READ]
description: Inner — update SD window, check convergence, fuzz or loop or start final sampling
gcode:
    {% set svv           = printer.save_variables.variables %}
    {% set i             = svv.v2z_current_tool|int %}
    {% set z             = printer.probe.last_z_result|float %}
    {% set probe_count   = svv.v2z_probe_count|default(0)|int %}
    {% set since_fuzz    = svv.v2z_since_fuzz|default(0)|int %}
    {% set win_count     = svv.v2z_win_count|default(0)|int %}
    {% set win_pos       = svv.v2z_win_pos|default(0)|int %}
    {% set fuzz_attempts = svv.v2z_fuzz_attempts|default(0)|int %}
    {% set threshold_sq  = 0.000025 %}   # (0.005 mm)²
    {% set fuzz_trigger  = 7 %}
    {% set max_probes    = 50 %}

    {% set new_probe_count = probe_count + 1 %}
    {% set new_since_fuzz  = since_fuzz + 1 %}
    {% set new_win_pos     = (win_pos + 1) % 4 %}
    {% set new_win_count   = [win_count + 1, 4]|min %}

    # Build updated window in Jinja2 — SAVE_VARIABLE hasn't executed yet
    # at template-evaluation time, so derive from the old svv values.
    {% set wns = namespace(w0 = svv.v2z_win_0|default(0.0)|float,
                           w1 = svv.v2z_win_1|default(0.0)|float,
                           w2 = svv.v2z_win_2|default(0.0)|float,
                           w3 = svv.v2z_win_3|default(0.0)|float) %}
    {% if win_pos == 0 %}{% set wns.w0 = z %}{% endif %}
    {% if win_pos == 1 %}{% set wns.w1 = z %}{% endif %}
    {% if win_pos == 2 %}{% set wns.w2 = z %}{% endif %}
    {% if win_pos == 3 %}{% set wns.w3 = z %}{% endif %}

    # Compute sample variance once the window is full (requires 4 readings)
    {% set cns = namespace(converged=false, variance=0.0) %}
    {% if new_win_count >= 4 %}
        {% set m = (wns.w0 + wns.w1 + wns.w2 + wns.w3) / 4.0 %}
        {% set cns.variance = ((wns.w0-m)**2 + (wns.w1-m)**2 + (wns.w2-m)**2 + (wns.w3-m)**2) / 3.0 %}
        {% set cns.converged = cns.variance < threshold_sq %}
    {% endif %}

    {% set converged   = cns.converged %}
    {% set limit_hit   = new_probe_count >= max_probes %}
    {% set should_fuzz = (new_since_fuzz >= fuzz_trigger) and not converged %}

    # Report — variance shown as μm² for readability (threshold = 25.0 μm²)
    {% if new_win_count < 4 %}
        RESPOND MSG="  T{i}  probe {new_probe_count}: {'%.4f'|format(z)}  (window {new_win_count}/4)"
    {% elif converged %}
        RESPOND MSG="  T{i}  probe {new_probe_count}: {'%.4f'|format(z)}  ✓ var={'%.1f'|format(cns.variance * 1e6)} μm²"
    {% else %}
        RESPOND MSG="  T{i}  probe {new_probe_count}: {'%.4f'|format(z)}  ✗ var={'%.1f'|format(cns.variance * 1e6)} μm²  ({new_since_fuzz}/{fuzz_trigger})"
    {% endif %}

    # Save window state; the fuzz branch below overrides win_count/win_pos to 0
    SAVE_VARIABLE VARIABLE={'v2z_win_%d' % win_pos} VALUE={'%.6f'|format(z)}
    SAVE_VARIABLE VARIABLE=v2z_win_pos     VALUE={new_win_pos}
    SAVE_VARIABLE VARIABLE=v2z_win_count   VALUE={new_win_count}
    SAVE_VARIABLE VARIABLE=v2z_probe_count VALUE={new_probe_count}

    {% if converged %}
        RESPOND MSG="  T{i}  converged after {new_probe_count} probes — taking final samples..."
        SAVE_VARIABLE VARIABLE=v2z_sample_idx VALUE=0
        UPDATE_DELAYED_GCODE ID=_cz_sample_loop DURATION=0.1
    {% elif limit_hit %}
        RESPOND TYPE=error MSG="  T{i}  no convergence after {max_probes} probes — taking final samples anyway..."
        SAVE_VARIABLE VARIABLE=v2z_sample_idx VALUE=0
        UPDATE_DELAYED_GCODE ID=_cz_sample_loop DURATION=0.1
    {% elif should_fuzz %}
        RESPOND MSG="  T{i}  7 probes without convergence — fuzzing to position {fuzz_attempts + 1}"
        SAVE_VARIABLE VARIABLE=v2z_fuzz_attempts VALUE={fuzz_attempts + 1}
        SAVE_VARIABLE VARIABLE=v2z_since_fuzz    VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_win_count     VALUE=0
        SAVE_VARIABLE VARIABLE=v2z_win_pos       VALUE=0
        UPDATE_DELAYED_GCODE ID=_cz_fuzz_move DURATION=0.1
    {% else %}
        SAVE_VARIABLE VARIABLE=v2z_since_fuzz VALUE={new_since_fuzz}
        UPDATE_DELAYED_GCODE ID=_cz_probe_loop DURATION=0.1
    {% endif %}


[delayed_gcode _cz_probe_loop]
gcode:
    _CZ_PROBE_STEP


#####################################################################
#  FUZZ MOVE
#####################################################################

[gcode_macro _CZ_FUZZ_MOVE]
description: Inner — move to next position on fuzz circle, restart convergence
gcode:
    {% set svv   = printer.save_variables.variables %}
    {% set tp    = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set cfg   = printer["gcode_macro CAL_Z"] %}
    {% set th    = printer.toolhead %}
    {% set z_clr = tp.probe_z_clearance|float %}
    {% set i     = svv.v2z_current_tool|int %}
    {% set fa    = svv.v2z_fuzz_attempts|int %}
    {% set loc   = cfg.probe_location %}
    {% set ins   = cfg.edge_inset|float %}

    # Re-compute clean probe centre
    {% set bcx = (th.axis_minimum.x + th.axis_maximum.x) / 2 %}
    {% set bcy = (th.axis_minimum.y + th.axis_maximum.y) / 2 %}
    {% set r   = 5.0 %}
    {% set pns = namespace(cx=bcx, cy=bcy) %}
    {% if loc == "rear"  %}{% set pns.cy = th.axis_maximum.y - ins - r %}{% endif %}
    {% if loc == "front" %}{% set pns.cy = th.axis_minimum.y + ins + r %}{% endif %}
    {% if loc == "left"  %}{% set pns.cx = th.axis_minimum.x + ins + r %}{% endif %}
    {% if loc == "right" %}{% set pns.cx = th.axis_maximum.x - ins - r %}{% endif %}

    # 6 positions on a 3 mm radius circle (within the 10 mm diameter),
    # spaced 60° apart so adjacent positions are exactly 3 mm apart.
    {% set fuzz_dx = [ 3.0,  1.5, -1.5, -3.0, -1.5,  1.5] %}
    {% set fuzz_dy = [ 0.0,  2.6,  2.6,  0.0, -2.6, -2.6] %}
    {% set idx = (fa - 1) % (fuzz_dx|length) %}
    {% set tx  = pns.cx + fuzz_dx[idx] %}
    {% set ty  = pns.cy + fuzz_dy[idx] %}

    G0 Z{z_clr} F1500
    G0 X{'%.3f'|format(tx)} Y{'%.3f'|format(ty)} F3000

    UPDATE_DELAYED_GCODE ID=_cz_probe_loop DURATION=0.1


[delayed_gcode _cz_fuzz_move]
gcode:
    _CZ_FUZZ_MOVE


#####################################################################
#  FINAL SAMPLE LOOP
#####################################################################

[gcode_macro _CZ_SAMPLE_STEP]
description: Inner — small relative retract, take one final sample at current speed, hand off to _CZ_RECORD
gcode:
    {% set svv   = printer.save_variables.variables %}
    {% set cfg   = printer["gcode_macro CAL_Z"] %}
    {% set fa    = svv.v2z_fuzz_attempts|default(0)|int %}
    {% set spd   = cfg.probe_speed|float %}
    {% set actual_spd = spd / 2.0 if fa >= 2 else spd %}
    # Same relative retract as convergence probes — bed surface already known
    G91
    G0 Z{cfg.probe_retract} F1500
    G90
    PROBE PROBE_SPEED={actual_spd}
    _CZ_RECORD


[gcode_macro _CZ_RECORD]
description: Inner — save this final sample, loop or trigger median calculation
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro CAL_Z"] %}
    {% set i   = svv.v2z_current_tool|int %}
    {% set z   = printer.probe.last_z_result|float %}
    {% set idx = svv.v2z_sample_idx|default(0)|int %}
    {% set sc  = cfg.sample_count|int %}

    RESPOND MSG="  T{i}  sample {idx + 1}/{sc}: {'%.4f'|format(z)}"
    SAVE_VARIABLE VARIABLE={'v2z_sample_%d' % idx} VALUE={'%.6f'|format(z)}
    SAVE_VARIABLE VARIABLE=v2z_sample_idx VALUE={idx + 1}

    {% if idx + 1 >= sc %}
        UPDATE_DELAYED_GCODE ID=_cz_median_loop DURATION=0.1
    {% else %}
        UPDATE_DELAYED_GCODE ID=_cz_sample_loop DURATION=0.1
    {% endif %}


[gcode_macro _CZ_COMPUTE_MEDIAN]
description: Inner — sort final samples, compute median, save result, advance to next tool
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro CAL_Z"] %}
    {% set i   = svv.v2z_current_tool|int %}
    {% set sc  = cfg.sample_count|int %}

    {% set ns = namespace(data=[]) %}
    {% for j in range(sc) %}
        {% set ns.data = ns.data + [svv["v2z_sample_%d" % j]|float] %}
    {% endfor %}

    {% set sorted_samples = ns.data|sort %}
    {% set median = sorted_samples[sc // 2] if sc % 2 == 1 else (sorted_samples[sc // 2 - 1] + sorted_samples[sc // 2]) / 2.0 %}

    RESPOND MSG="  T{i}  median of {sc} samples: {'%.4f'|format(median)}"
    SAVE_VARIABLE VARIABLE={'v2z_result_%d' % i} VALUE={'%.6f'|format(median)}
    SAVE_VARIABLE VARIABLE=v2z_current_tool VALUE={i + 1}
    UPDATE_DELAYED_GCODE ID=_cz_tool_loop DURATION=0.1


[delayed_gcode _cz_sample_loop]
gcode:
    _CZ_SAMPLE_STEP


[delayed_gcode _cz_median_loop]
gcode:
    _CZ_COMPUTE_MEDIAN


[delayed_gcode _cz_tool_loop]
gcode:
    _CZ_NEXT_TOOL


#####################################################################
#  FINALIZE
#####################################################################

[gcode_macro _CZ_FINALIZE]
description: Inner — compute Z offsets from median results and save
gcode:
    {% set svv    = printer.save_variables.variables %}
    {% set n      = svv.v2z_total_tools|int %}
    {% set ref_z  = svv.v2z_result_0|float %}
    {% set t0_off = svv.t0_offset_z|default(0.0)|float %}

    PARK_TOOL

    RESPOND MSG="═══════════════════════════════════════════════"
    RESPOND MSG="  CAL_Z — RESULTS"
    RESPOND MSG="  T0 reference: probe Z={'%.4f'|format(ref_z)}  offset={'%.3f'|format(t0_off)}"
    RESPOND MSG="───────────────────────────────────────────────"

    {% for i in range(n) %}
        {% set probe_i = svv["v2z_result_%d" % i]|float %}
        {% set delta   = probe_i - ref_z %}
        {% set new_z   = t0_off + delta %}
        SAVE_VARIABLE VARIABLE=t{i}_offset_z VALUE={'%.3f'|format(new_z)}
        RESPOND MSG="  T{i}  median={'%.4f'|format(probe_i)}  Δ={'%+.4f'|format(delta)}  → t{i}_offset_z={'%.3f'|format(new_z)}"
    {% endfor %}

    RESPOND MSG="═══════════════════════════════════════════════"
    RESPOND MSG="  Done. Re-load a tool to apply the new offsets."
    RESPOND MSG="═══════════════════════════════════════════════"

#####################################################################
#  DOCK X CALIBRATION
#####################################################################
#
#  CALIBRATE_DOCK_X measures the absolute X of a tool dock using the
#  INDX plugin's native INDX_DOCK_MEASURE command. INDX_DOCK_MEASURE
#  energises XY, homes Y then X from the dock, and derives the absolute
#  position from the raw stepper counts, so it works for each tool in
#  turn without a prior G28.
#
#  A command's result is not visible within the same macro, so the
#  measured value is read back from printer.indx.last_dock_measurement
#  one tick later (delayed_gcode) and reported for you to paste into
#  indx.cfg — same report-and-paste flow as CAL_SET_DOCK_Y.
#
#  Workflow:
#    1. M84  (disable motors)
#    2. Manually slide the toolhead to the tool dock
#    3. CALIBRATE_DOCK_X TOOL=N   → note the reported x value
#    4. Repeat from step 1 for each additional tool
#    5. Paste each variable_tN_x into indx.cfg, then RESTART
#    6. G28 to restore machine coordinates
#
#  If the printer is already homed, jog to the dock and run
#  READ_DOCK_POSITION TOOL=N instead (no homing move required).
#
#####################################################################

[gcode_macro CALIBRATE_DOCK_X]
description: Measure absolute dock X for TOOL=n via INDX_DOCK_MEASURE. Run after M84 + manual slide to dock.
variable_tool: 0
gcode:
    {% set t = params.TOOL|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=CALIBRATE_DOCK_X VARIABLE=tool VALUE={t}
    RESPOND MSG="──────────────────────────────────────────────"
    RESPOND MSG="  CALIBRATE_DOCK_X  T{t}"
    RESPOND MSG="  Ensure motors are disabled (M84) and the toolhead"
    RESPOND MSG="  is manually positioned at the T{t} dock."
    RESPOND MSG="──────────────────────────────────────────────"
    # INDX_DOCK_MEASURE homes Y then X and stores the measured dock
    # position in printer.indx.last_dock_measurement.
    INDX_DOCK_MEASURE
    # Result is only readable after the command runs — pick it up next tick.
    UPDATE_DELAYED_GCODE ID=_cal_dock_x_report DURATION=0.1


[delayed_gcode _cal_dock_x_report]
gcode:
    {% set t = printer["gcode_macro CALIBRATE_DOCK_X"].tool|int %}
    {% set m = printer.indx.last_dock_measurement %}
    {% if m %}
        {% set new_x = "%.3f"|format(m['x']|float) %}
        RESPOND MSG="──────────────────────────────────────"
        RESPOND MSG="  T{t} dock_x = {new_x}"
        RESPOND MSG="  Update indx.cfg:"
        RESPOND MSG="    variable_t{t}_x: {new_x}"
        RESPOND MSG="  Then RESTART to apply, and G28 to restore coordinates."
        RESPOND MSG="──────────────────────────────────────"
    {% else %}
        RESPOND TYPE=error MSG="No dock measurement available — did INDX_DOCK_MEASURE run?"
    {% endif %}


[gcode_macro READ_DOCK_POSITION]
description: Save current (already-homed) X as dock X for TOOL=n. Home first, jog to the dock, then run.
gcode:
    {% set t = params.TOOL|default(0)|int %}
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
        RESPOND TYPE=error MSG="READ_DOCK_POSITION: home the printer (G28) first, or use CALIBRATE_DOCK_X."
    {% else %}
        {% set new_x = "%.3f"|format(printer.toolhead.position.x|float) %}
        RESPOND MSG="──────────────────────────────────────"
        RESPOND MSG="  T{t} dock_x = {new_x}"
        RESPOND MSG="  Update indx.cfg:"
        RESPOND MSG="    variable_t{t}_x: {new_x}"
        RESPOND MSG="  Then RESTART to apply."
        RESPOND MSG="──────────────────────────────────────"
    {% endif %}


[gcode_macro _CAL_LATCH_ENGAGE]
description: Inner — 3 mm E move after tool pickup to ensure latch is fully engaged during calibration (never called during printing)
gcode:
    SAVE_GCODE_STATE NAME=_cal_latch
    _TC_SET_ROTATION_DIST
    # Cold-capable latch engage via INDX_EXTRUDER_MOVE.
    _TC_LATCH_MOVE E=3 F=300
    _TC_RESTORE_ROTATION_DIST
    RESTORE_GCODE_STATE NAME=_cal_latch


[gcode_macro _CAL_PARK_ACTIVE]
description: Inner — park the active tool using raw TOOL_POSITIONS variables (safe before INIT_STATE populates tp.tools)
gcode:
    {% set tp  = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set c   = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set st  = printer["gcode_macro _TOOLCHANGE_VARS"].toolhead_state|int %}
    {% set ns  = namespace(act=printer.save_variables.variables.active_tool|default(-1)|int) %}
    # If toolhead is physically locked but active_tool is unknown, default to T0
    {% if ns.act < 0 and st == 0 %}
        {% set ns.act = 0 %}
    {% endif %}

    {% if ns.act >= 0 %}
        {% set act       = ns.act %}
        {% set dock_y    = tp["t" ~ act ~ "_dock_y"]|float %}
        {% set clear_y   = tp.clearance_y|float %}
        {% set tool_x    = tp["t" ~ act ~ "_x"]|float %}

        G90
        G1 X{tool_x} Y{clear_y} F15000

        {% if st == 0 %}
            _SYNC_UNLOCK_DANCE DOCK_Y={dock_y}
            SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=2
            SAVE_VARIABLE VARIABLE=toolhead_state VALUE=2
        {% else %}
            G1 Y{dock_y} F{c.dock_feedrate}
        {% endif %}

        M400
        G91
        G1 Y{c.peel_distance} F{c.peel_feedrate}
        G90
        G1 Y{clear_y} F15000

        SAVE_VARIABLE VARIABLE=active_tool VALUE=-1
    {% endif %}

#####################################################################
#  7. UTILITIES & INSPECTION
#####################################################################

[gcode_macro CAL_CHECK_OFFSETS]
description: Print all saved tool offsets and current global Z state
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set tp  = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set n   = tp.tool_count|int %}
    {% set gz  = svv.global_z_offset|default(0.0)|float %}
    {% set act = svv.active_tool|default(-1)|int %}
    # homing_origin.z = tool_z + global_z; strip tool_z to show the pure global component
    {% set act_tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float if act >= 0 else 0.0 %}
    {% set live_gz = printer.gcode_move.homing_origin.z|float - act_tool_z %}
    RESPOND MSG="----------------------------------------"
    RESPOND MSG="  TOOL OFFSETS"
    RESPOND MSG="----------------------------------------"
    {% for i in range(n) %}
        {% set ox = svv["t" ~ i ~ "_offset_x"]|default("--")|string %}
        {% set oy = svv["t" ~ i ~ "_offset_y"]|default("--")|string %}
        {% set oz = svv["t" ~ i ~ "_offset_z"]|default("--")|string %}
        RESPOND MSG="  T{i}  X={ox}  Y={oy}  Z={oz}"
    {% endfor %}
    RESPOND MSG="----------------------------------------"
    RESPOND MSG="  Saved global Z:  {'%.3f'|format(gz)} mm"
    RESPOND MSG="  Live  global Z:  {'%.3f'|format(live_gz)} mm"
    RESPOND MSG="  (use ADJUST_GLOBAL_Z ADJUST=+/-mm to tune first layer)"
    RESPOND MSG="----------------------------------------"

[gcode_macro RESET_GLOBAL_Z]
description: Clear the global Z offset back to 0.0
gcode:
    SAVE_VARIABLE VARIABLE=global_z_offset VALUE=0.0
    {% set svv = printer.save_variables.variables %}
    {% set act = svv.active_tool|default(-1)|int %}
    {% if act >= 0 %}
        {% set tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float %}
        SET_GCODE_OFFSET Z='{"%.3f"|format(tool_z)}' MOVE=1
    {% endif %}
    RESPOND MSG="Global Z offset cleared to 0.0"

[gcode_macro ADJUST_GLOBAL_Z]
description: Nudge the global Z offset by ADJUST mm (e.g. ADJUST=0.02 or ADJUST=-0.05)
gcode:
    {% set delta = params.ADJUST|default(0.0)|float %}
    {% set svv   = printer.save_variables.variables %}
    {% set old_gz = svv.global_z_offset|default(0.0)|float %}
    {% set new_gz = old_gz + delta %}
    SAVE_VARIABLE VARIABLE=global_z_offset VALUE='{"%.3f"|format(new_gz)}'
    {% set act = svv.active_tool|default(-1)|int %}
    {% if act >= 0 %}
        {% set tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float %}
        SET_GCODE_OFFSET Z='{"%.3f"|format(tool_z + new_gz)}' MOVE=1
    {% endif %}
    RESPOND MSG="Global Z offset: {'%.3f'|format(new_gz)} mm  (adjusted {'%+.3f'|format(delta)})"

[gcode_macro SYNC_GLOBAL_Z]
description: Capture the current live babystep (homing_origin.z) as the saved global Z offset
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set act = svv.active_tool|default(-1)|int %}
    {% set tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float if act >= 0 else 0.0 %}
    {% set new_gz = printer.gcode_move.homing_origin.z|float - tool_z %}
    SAVE_VARIABLE VARIABLE=global_z_offset VALUE='{"%.3f"|format(new_gz)}'
    RESPOND MSG="Global Z offset synced: {'%.3f'|format(new_gz)} mm"

[gcode_macro Z_OFFSET_APPLY_PROBE]
rename_existing: _Z_OFFSET_APPLY_PROBE_BASE
description: Bake current global Z into probe z_offset. Run SAVE_CONFIG to persist across restarts.
gcode:
    # homing_origin.z = tool_z + global_z. The base command subtracts homing_origin.z from
    # [load_cell_probe] z_offset, so we must temporarily set it to only global_z first.
    # After baking, restore homing_origin.z to tool_z so the active tool stays correct.
    {% set svv = printer.save_variables.variables %}
    {% set act = svv.active_tool|default(-1)|int %}
    {% set tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float if act >= 0 else 0.0 %}
    {% set global_z = svv.global_z_offset|default(0.0)|float %}
    SET_GCODE_OFFSET Z='{"%.3f"|format(global_z)}'
    _Z_OFFSET_APPLY_PROBE_BASE
    SET_GCODE_OFFSET Z='{"%.3f"|format(tool_z)}'
    SAVE_VARIABLE VARIABLE=global_z_offset VALUE=0.0
    RESPOND MSG="Global Z baked into [load_cell_probe] z_offset. Run SAVE_CONFIG to persist."


#####################################################################
#  FILAMENT LOADING & HEAT CAPACITY
#####################################################################
#
#  LOAD_FILAMENT picks up a tool, tells the INDX safety thermal model
#  which filament is loaded, heats up, then feeds and primes it.
#
#    LOAD_FILAMENT TOOL=<n> TYPE=<material> [TEMP=<c>] [MEASURE=<0|1>]
#
#  The safety thermal model needs to know how much heat the filament
#  carries away. TYPE=<material> applies a density + heat-capacity preset
#  (from the filament_presets table below) plus a default load temperature.
#  Presets are good starting points; for the most accurate model on a
#  specific filament pass MEASURE=1 and INDX_LOAD_FILAMENT will measure the
#  heat capacity while loading (run SAVE_CONFIG afterwards to keep it).
#
#  TEMP=<c> overrides the preset load temperature. Requires a calibrated
#  thermal model — run INDX_CALIBRATE first.
#
#  Edit filament_presets to add materials or tune values
#  (temp °C / density g/cm^3 / heat capacity J/g/K).
#
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Pick up TOOL=n, set filament TYPE, heat, and load+prime. Optional TEMP= override; MEASURE=1 measures the heat capacity instead of using the preset.
variable_filament_presets: {"PLA": {"temp": 210, "density": 1.24, "hc": 1.80}, "PETG": {"temp": 240, "density": 1.27, "hc": 1.30}, "ABS": {"temp": 245, "density": 1.04, "hc": 1.40}, "ASA": {"temp": 250, "density": 1.07, "hc": 1.40}, "PA": {"temp": 260, "density": 1.14, "hc": 1.70}, "PC": {"temp": 270, "density": 1.20, "hc": 1.20}, "TPU": {"temp": 230, "density": 1.21, "hc": 1.80}}
gcode:
    {% set presets = printer["gcode_macro LOAD_FILAMENT"].filament_presets %}
    {% if 'TOOL' not in params %}
        {action_raise_error("Usage: LOAD_FILAMENT TOOL=<n> TYPE=<material>")}
    {% endif %}
    {% set t       = params.TOOL|int %}
    {% set type    = params.TYPE|default("")|upper %}
    {% set measure = params.MEASURE|default(0)|int %}

    {% if type and type not in presets %}
        {action_raise_error("Unknown TYPE '%s'. Known types: %s" % (type, presets|join(", ")))}
    {% endif %}

    # Load temperature: explicit TEMP= wins, else the TYPE preset, else error
    {% if 'TEMP' in params %}
        {% set temp = params.TEMP|float %}
    {% elif type %}
        {% set temp = presets[type]['temp']|float %}
    {% else %}
        {action_raise_error("Provide TYPE=<material> or TEMP=<c>.")}
    {% endif %}

    # 1. Pick up the tool (CHANGE_TOOL turns the heater off and picks up cold)
    CHANGE_TOOL TOOL={t}

    # 2. Tell the safety model which filament this is (skipped when measuring)
    {% if type and not measure %}
        INDX_SET_MODEL_PARAMS FILAMENT_DENSITY={presets[type]['density']} FILAMENT_HEAT_CAPACITY={presets[type]['hc']}
        RESPOND MSG="LOAD_FILAMENT: T{t} {type} — density {presets[type]['density']} g/cm^3, heat capacity {presets[type]['hc']} J/g/K"
    {% endif %}

    # 3. Heat to load temperature and wait
    RESPOND MSG="LOAD_FILAMENT: heating T{t} to {temp|int} C..."
    M104 S{temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={temp}

    # 4. Feed and prime. MEASURE=1 measures + applies the heat capacity for this
    #    exact filament (APPLY=1); otherwise the TYPE preset is kept (APPLY=0).
    INDX_LOAD_FILAMENT APPLY={measure}
    {% if measure %}
        RESPOND MSG="LOAD_FILAMENT: measured heat capacity applied — run SAVE_CONFIG to keep it."
    {% endif %}


#####################################################################
#  LOAD CELL CALIBRATION
#####################################################################
#
#  Calibrate the load cell BEFORE the first Z homing. Z homing probes
#  with the load cell, so it must be calibrated before the printer can
#  home Z — and therefore before dock and Z-offset calibration. The tool
#  is seated by hand because the dock can't be used until Z is homed.
#  X and Y ARE homed first (they don't use the load cell).
#
#  The latch is driven by the extruder motor, so it opens/locks cold.
#  Two steps:
#
#    1) CALIBRATE_LOAD_CELL            (NO tool mounted)
#         Homes X and Y, opens the latch, tares the empty head.
#    2) (seat a passive tool by hand)
#       CALIBRATE_LOAD_CELL_APPLY GRAMS=1600
#         Locks the latch, engages the locking force, calibrates, accepts.
#       SAVE_CONFIG
#
#  Note: LOAD_CELL_CALIBRATE / TARE / CALIBRATE / ACCEPT are the firmware's
#  interactive calibration commands; these macros issue them in sequence.
#  If your build does not allow them to be chained from a macro, run the
#  steps by hand (the wiki lists them).
#
#####################################################################

[gcode_macro CALIBRATE_LOAD_CELL]
description: Load cell calibration step 1 of 2 — run before first Z homing with NO tool mounted. Homes X and Y, opens the latch, and tares the empty head, then prompts you to seat a tool and run CALIBRATE_LOAD_CELL_APPLY.
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    # Home X and Y — Z is NOT homed yet; Z homing needs the calibrated load cell.
    G28 X Y
    LOAD_CELL_CALIBRATE
    # Open the latch so a passive tool can be seated by hand
    _TC_SET_ROTATION_DIST
    _TC_LATCH_MOVE E={c.full_open_e} F={c.latch_feedrate}
    _TC_RESTORE_ROTATION_DIST
    M400
    G4 P500
    # Tare the empty head
    TARE
    RESPOND MSG="Load cell tared (empty head). Seat a passive tool on the Smart Head by hand, then run: CALIBRATE_LOAD_CELL_APPLY GRAMS=1600"

[gcode_macro CALIBRATE_LOAD_CELL_APPLY]
description: Load cell calibration step 2 of 2 — with a tool seated by hand, locks the latch, applies the locking force, and calibrates against GRAMS (default 1600). Run SAVE_CONFIG after.
gcode:
    {% set grams = params.GRAMS|default(1600)|float %}
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    # Lock the latch onto the seated tool, then drive it to fully engage the
    # locking force (all cold-capable extruder moves — no homing needed).
    _TC_SET_ROTATION_DIST
    _TC_LATCH_MOVE E={c.full_lock_e} F={c.latch_feedrate}
    _TC_LATCH_MOVE E=10 F=300
    _TC_RESTORE_ROTATION_DIST
    M400
    G4 P500
    CALIBRATE GRAMS={grams}
    ACCEPT
    RESPOND MSG="Load cell calibrated against {grams|int} g. Run SAVE_CONFIG to save."
