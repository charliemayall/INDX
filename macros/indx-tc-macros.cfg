#####################################################################
#  INDX HARDWARE CONSTANTS
#####################################################################
#
#  These values are fixed by the INDX mechanism geometry and gear
#  mesh. DO NOT MODIFY unless you are changing the physical hardware.
#
#  Per-tool positions are derived as:
#     trigger_y   = tool.dock_y - TOOL_POSITIONS.dock_dir * trigger_offset
#     clearance_y = TOOL_POSITIONS.clearance_y                   (set in indx.cfg)
#
#####################################################################

[gcode_macro _INDX_CONSTANTS]
description: Fixed INDX hardware constants — do not modify

# --- Dock geometry ---
# Distance for the gentle peel-off after parking/pickup (relative move)
variable_peel_distance: 10.0

# --- Unlock dance: Y depths toward the dock from trigger_y ---
# These define the waypoints of the wiggle sequence.
# Expressed as positive distances along dock_dir from trigger_y.
variable_squeeze_depth: 0.5
variable_wiggle_in_depth: 1.0
variable_wiggle_out_depth: 2.0

# --- Unlock dance: E-axis moves (gear mesh — do not change) ---
variable_squeeze_e: -0.27
variable_wiggle_in_e: 0.27
variable_wiggle_out_e: -1.7
variable_full_open_e: -11.0
variable_full_lock_e: 11.0

# --- Feed rates (mm/min) ---
variable_squeeze_feedrate: 2000
variable_wiggle_feedrate: 2500
variable_dock_feedrate: 3000
variable_latch_feedrate: 1500
variable_peel_feedrate: 3000
variable_engage_feedrate: 2500

# --- Extruder current (amps) ---
variable_squeeze_current: 0.2
variable_run_current: 0.6

# --- E-axis rotation distance for TC moves ---
# All E moves in the macros use this value regardless of what is set in printer.cfg.
# printer.cfg rotation_distance is restored after every macro that issues E moves.
variable_tc_rotation_distance: 5.7

# --- Load-cell tool presence ---
# Detect uses absolute grams vs empty-head reference: force_g + tare_force.
# Z probing re-tares the host cell, so raw force_g alone is wrong after home/probe.
# Cal may cinch to ~1600 g once; pickup uses full_lock_e only (no cinch like calibration).
# Normal-lock absolute preload is often below 1600; min ~400 fails closed on empty.
# Raise if false negatives; lower only with care (false positives heat an empty coil).
variable_tool_detect_enabled: 1
variable_tool_detect_min_force_g: 400.0
variable_tool_detect_settle_ms: 800

gcode:

#####################################################################
#  1. GLOBAL VARIABLES & STATUS DASHBOARD
#####################################################################

[gcode_macro _TOOLCHANGE_VARS]
variable_mode: "normal"
variable_accel_mult: 0.7
variable_speed_mult: 0.7
variable_toolhead_state: 0 # 0=Locked, 2=Open
variable_rotation_dist_overridden: 0
# Set by [homing_override] so CHANGE_TOOL/PARK_TOOL do not re-enter G28 mid-home.
variable_homing_busy: 0
gcode:

[delayed_gcode INIT_STATE]
initial_duration: 5.0
gcode:
    # Build the tools list from the numbered variables in TOOL_POSITIONS
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set ns = namespace(json="") %}
    {% for i in range(tp.tool_count|int) %}
        {% set x  = tp["t" ~ i ~ "_x"]|float %}
        {% set dy = tp["t" ~ i ~ "_dock_y"]|float %}
        {% set entry = '{"x": %.3f, "dock_y": %.3f}' % (x, dy) %}
        {% if loop.first %}
            {% set ns.json = "[" ~ entry %}
        {% else %}
            {% set ns.json = ns.json ~ ", " ~ entry %}
        {% endif %}
    {% endfor %}
    SET_GCODE_VARIABLE MACRO=TOOL_POSITIONS VARIABLE=tools VALUE='{ns.json}]'

    {% set sv = printer.save_variables.variables %}
    # Restore saved latch state so INDX displays the correct Open/Locked label after a
    # firmware restart. The INDX latch is mechanically self-retaining, so the saved value
    # accurately reflects the physical position across restarts.
    # Defaults to 0 (Locked) on first boot before any toolchange has been recorded.
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE={sv.toolhead_state|default(0)|int}

    MODE_{sv.tc_mode|default("NORMAL")|upper}
    TOOL_STATUS

[gcode_macro TOOL_STATUS]
gcode:
    {% set sv = printer.save_variables.variables %}
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set st = printer["gcode_macro _TOOLCHANGE_VARS"].toolhead_state|int %}
    {% set mode = printer["gcode_macro _TOOLCHANGE_VARS"].mode|upper %}
    {% set state_label = "🔒 LOCKED" if st == 0 else "🔓 OPEN" %}
    RESPOND MSG="----------------------------------------"
    RESPOND MSG="  ⚙️ SPEED MODE:  {mode}"
    RESPOND MSG="  🔐 LOCK STATE:  {state_label}"
    RESPOND MSG="  🔧 TOOLS:       {tp.tools|length} configured"
    RESPOND MSG="  📦 ACTIVE TOOL: {('T' ~ sv.active_tool if sv.active_tool|default(-1)|int >= 0 else 'NONE')}"
    RESPOND MSG="  🔄 TC COUNT:    {sv.toolchange_count|default(0)|int}"
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {% if vd.last_ok|int == 1 %}
        RESPOND MSG="  ⚖️ TOOL DETECT: ok ({'%.1f'|format(vd.last_force_g|float)}g)"
    {% elif vd.last_ok|int == 0 %}
        RESPOND MSG="  ⚖️ TOOL DETECT: fail ({'%.1f'|format(vd.last_force_g|float)}g)"
    {% endif %}
    RESPOND MSG="----------------------------------------"
    RESPOND MSG="  🛠️ INDX STATUS"
    RESPOND MSG="----------------------------------------"

[gcode_macro INDX]
gcode: TOOL_STATUS

[gcode_macro INDX_FORCE_STATE]
description: Soft-state only. Set ACTIVE_TOOL=n (-1 = none). Does not move the latch or apply offsets.
gcode:
    {% if "ACTIVE_TOOL" not in params %}
        {action_raise_error("Usage: INDX_FORCE_STATE ACTIVE_TOOL=<n|-1>")}
    {% endif %}
    {% set t = params.ACTIVE_TOOL|int %}
    {% set n = printer["gcode_macro TOOL_POSITIONS"].tool_count|int %}
    {% if t < -1 or t >= n %}
        {action_raise_error("ACTIVE_TOOL=%d out of range (-1..%d)"|format(t, n - 1))}
    {% endif %}
    SAVE_VARIABLE VARIABLE=active_tool VALUE={t}
    RESPOND MSG="INDX_FORCE_STATE: active_tool={'NONE' if t < 0 else ('T' ~ t)}"

[gcode_macro INDX_UNLOCK]
description: Open the latch in place (no dock dance). Updates lock soft-state to Open.
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    _TC_SET_ROTATION_DIST
    _TC_LATCH_MOVE E={c.full_open_e} F={c.latch_feedrate} I={c.run_current}
    _TC_RESTORE_ROTATION_DIST
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=2
    SAVE_VARIABLE VARIABLE=toolhead_state VALUE=2
    RESPOND MSG="INDX_UNLOCK: latch open"

[gcode_macro INDX_LOCK]
description: Close the latch in place. Updates lock soft-state to Locked.
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    _TC_SET_ROTATION_DIST
    _TC_LATCH_MOVE E={c.full_lock_e} F={c.latch_feedrate} I={c.run_current}
    _TC_RESTORE_ROTATION_DIST
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=0
    SAVE_VARIABLE VARIABLE=toolhead_state VALUE=0
    RESPOND MSG="INDX_LOCK: latch locked"

#####################################################################
#  2. SPEED & POWER MODES
#####################################################################

[gcode_macro _RESTORE_EXTRUDER_CURRENT]
description: Inner — restore extruder TMC current to the value configured in printer.cfg (called after toolchange and on mode switch)
gcode:
    {% set cfg = printer.configfile.settings %}
    {% set tmc_sections = ["tmc2240 extruder", "tmc2209 extruder", "tmc2130 extruder", "tmc5160 extruder"] %}
    {% set ns = namespace(current=none, found=false) %}
    {% for s in tmc_sections %}
        {% if s in cfg and not ns.found %}
            {% set ns.current = cfg[s].run_current %}
            {% set ns.found = true %}
        {% endif %}
    {% endfor %}
    {% if ns.found %}
    SET_TMC_CURRENT STEPPER=extruder CURRENT={ns.current}
    {% endif %}


[gcode_macro _TC_SET_ROTATION_DIST]
description: Inner — set extruder rotation_distance to the fixed TC value before any TC E moves
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set target = c.tc_rotation_distance|float %}
    {% set configured = printer.configfile.settings.extruder.rotation_distance|float %}
    {% if (configured - target)|abs > 0.0001 %}
        SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE={target}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=rotation_dist_overridden VALUE=1
    {% endif %}

[gcode_macro _TC_RESTORE_ROTATION_DIST]
description: Inner — restore extruder rotation_distance to the value configured in printer.cfg
gcode:
    {% if printer["gcode_macro _TOOLCHANGE_VARS"].rotation_dist_overridden %}
        SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE={printer.configfile.settings.extruder.rotation_distance}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=rotation_dist_overridden VALUE=0
    {% endif %}

[gcode_macro _TC_LATCH_MOVE]
description: Inner — cold-capable latch move via INDX_EXTRUDER_MOVE. E=distance mm, F=feedrate mm/min, I=current amps (default run_current). Bypasses min_extrude_temp so tool changes run without heating the tool.
gcode:
    {% set e = params.E|float %}
    {% set f = params.F|default(1500)|float %}
    {% set i = params.I|default(printer["gcode_macro _INDX_CONSTANTS"].run_current)|float %}
    # INDX_EXTRUDER_MOVE drives the extruder stepper directly with the
    # min_extrude_temp check bypassed, and sets/restores TMC current around the
    # move. SPEED is in mm/s; the INDX constants use mm/min feedrates.
    INDX_EXTRUDER_MOVE DISTANCE={e} SPEED={f / 60.0} CURRENT={i}

[gcode_macro _SET_MODE]
gcode:
    # 1. Save local multipliers for toolchange _TC_G0 moves ONLY
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=mode VALUE='"{params.M}"'
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=accel_mult VALUE={params.A|float}
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=speed_mult VALUE={params.S|float}

    # 2. Write Acoustic Modes to TMC Stepper Hardware (Global & Persistent)
    # 0 = StealthChop (Quiet/Hot), 1 = SpreadCycle (Loud/Powerful)
    SET_TMC_FIELD STEPPER=stepper_x FIELD=en_spreadcycle VALUE={params.C|int}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=en_spreadcycle VALUE={params.C|int}
    # Restore extruder current to printer.cfg value (ensures mode switch doesn't leave wrong current)
    _RESTORE_EXTRUDER_CURRENT

    # 3. Save to disk so the INIT_STATE macro restores it on reboot
    SAVE_VARIABLE VARIABLE=tc_mode VALUE='"{params.M}"'

[gcode_macro MODE_STEALTH]
gcode: _SET_MODE M=stealth A=0.2 S=0.2 C=0

[gcode_macro MODE_NORMAL]
gcode: _SET_MODE M=normal A=0.7 S=0.7 C=1

[gcode_macro MODE_SPORT]
gcode: _SET_MODE M=sport A=1.0 S=1.0 C=1

#####################################################################
#  3. DYNAMIC MOTION HELPERS
#####################################################################

[gcode_macro _TC_G0]
gcode:
    {% set v = printer["gcode_macro _TOOLCHANGE_VARS"] %}
    {% set final_f = (printer.configfile.settings.printer.max_velocity * 60 * v.speed_mult) %}
    G0 {% if 'X' in params %}X{params.X} {% endif %}{% if 'Y' in params %}Y{params.Y} {% endif %}{% if 'Z' in params %}Z{params.Z} {% endif %}F{params.F|default(final_f)|int}

[gcode_macro _LINEAR_EXIT]
gcode:
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set restore_z = params.RESTORE_Z|default("")|string %}

    {% set clearance_y = tp.clearance_y %}

    # 1. Gentle peel off the docking pins (relative move)
    G91
    G1 Y{-(tp.dock_dir * c.peel_distance)} F{c.peel_feedrate}

    # 2. High-speed sprint to the clearance line (absolute move).
    #    When RESTORE_Z is set (pickup exit), fold the Z hop-down into this move
    #    so Z descends simultaneously with XY — non-blocking hop.
    G90
    {% if restore_z != "" %}
        _TC_G0 Y={"%.3f"|format(clearance_y)} Z={restore_z}
    {% else %}
        _TC_G0 Y={"%.3f"|format(clearance_y)}
    {% endif %}

#####################################################################
#  4. THE DECOUPLED DOCKING DANCE
#####################################################################

[gcode_macro _SYNC_UNLOCK_DANCE]
description: Wiggle unlock sequence. Requires DOCK_Y parameter.
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set dock_y = params.DOCK_Y|float %}
    {% set trigger_y = dock_y - tp.dock_dir * tp.trigger_offset %}

    # Latch (E) moves run through INDX_EXTRUDER_MOVE so they work cold, with no
    # need to heat the tool. INDX_EXTRUDER_MOVE is E-only and waits for motion
    # before/after, so each latch nudge is done first, then the paired Y
    # approach move.
    _TC_SET_ROTATION_DIST
    G90

    # 1. Squeeze release (soft current)
    _TC_LATCH_MOVE E={c.squeeze_e} F={c.squeeze_feedrate} I={c.squeeze_current}
    G1 Y{"%.3f"|format(trigger_y + tp.dock_dir * c.squeeze_depth)} F{c.squeeze_feedrate}

    # 2. Wiggle In → Wiggle Out → Dock (latch nudge first, then Y approach)
    _TC_LATCH_MOVE E={c.wiggle_in_e} F={c.squeeze_feedrate} I={c.run_current}
    G1 Y{"%.3f"|format(trigger_y + tp.dock_dir * c.wiggle_in_depth)} F{c.squeeze_feedrate}
    _TC_LATCH_MOVE E={c.wiggle_out_e} F={c.wiggle_feedrate} I={c.run_current}
    G1 Y{"%.3f"|format(trigger_y + tp.dock_dir * c.wiggle_out_depth)} F{c.wiggle_feedrate}
    G1 Y{"%.3f"|format(dock_y)} F{c.dock_feedrate}

    # 3. Final stationary open
    M400
    _TC_LATCH_MOVE E={c.full_open_e} F={c.latch_feedrate} I={c.run_current}
    _TC_RESTORE_ROTATION_DIST

#####################################################################
#  5. THE ORCHESTRATION MACROS
#####################################################################

[gcode_macro CHANGE_TOOL]
gcode:
    {% if 'TOOL' not in params %}
        {action_raise_error("CHANGE_TOOL requires TOOL=<n> (or use T0/T1/...).")}
    {% endif %}
    {% set t = params.TOOL|int %}
        {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
        {% set act = printer.save_variables.variables.active_tool|default(-1)|int %}

        # If INIT_STATE hasn't fired yet, build the tools list inline now
        {% if tp.tools|length == 0 %}
            {% set ns = namespace(json="") %}
            {% for i in range(tp.tool_count|int) %}
                {% set x  = tp["t" ~ i ~ "_x"]|float %}
                {% set dy = tp["t" ~ i ~ "_dock_y"]|float %}
                {% set entry = '{"x": %.3f, "dock_y": %.3f}' % (x, dy) %}
                {% if loop.first %}
                    {% set ns.json = "[" ~ entry %}
                {% else %}
                    {% set ns.json = ns.json ~ ", " ~ entry %}
                {% endif %}
            {% endfor %}
            SET_GCODE_VARIABLE MACRO=TOOL_POSITIONS VARIABLE=tools VALUE='{ns.json}]'
        {% endif %}

        # Bounds check
        {% if t < 0 or t >= tp.tool_count|int %}
            {action_raise_error("T%d is not configured. %d tools available (T0–T%d)."
                % (t, tp.tool_count|int, tp.tool_count|int - 1))}
        {% endif %}

        {% if act != t %}
            # 0. Home if not already homed (skip when called from [homing_override])
            {% set busy = printer["gcode_macro _TOOLCHANGE_VARS"].homing_busy|default(0)|int %}
            {% if not busy and "xyz" not in printer.toolhead.homed_axes %}
                G28
            {% endif %}

            # 1. Save live slicer motion limits
            {% set live_vel = printer.toolhead.max_velocity %}
            {% set live_acc = printer.toolhead.max_accel %}

            # 2. Force Klipper to use raw printer.cfg maximums (scaled by TC mode)
            {% set max_v = printer.configfile.settings.printer.max_velocity %}
            {% set max_a = printer.configfile.settings.printer.max_accel %}
            {% set v = printer["gcode_macro _TOOLCHANGE_VARS"] %}
            SET_VELOCITY_LIMIT VELOCITY={max_v * v.speed_mult} ACCEL={max_a * v.accel_mult}

            # 3. Capture the target temperature then turn off the heater before any movement
            {% set target_temp = printer.extruder.target | float %}
            M104 S0
            
            # 4. Z-Sync before moving
            {% set svv = printer.save_variables.variables %}
            {% if act >= 0 %}
                {% set live_total_z = printer.gcode_move.homing_origin.z|float %}
                {% set tool_z = svv["t" ~ act ~ "_offset_z"]|default(0.0)|float %}
                SAVE_VARIABLE VARIABLE=global_z_offset VALUE='{"%.3f"|format(live_total_z - tool_z)}'
            {% endif %}

            # 5. Z-hop is non-blocking: rises with the first XY park move (PARK_TOOL),
            #    descends with the Y-clearance sprint in _LINEAR_EXIT after pickup.
            {% set zhop = tp.z_hop|float %}
            {% set restore_z = "%.3f"|format(printer.gcode_move.gcode_position.z) %}

            # 6. Physical tool swap
            {% if act != -1 %}
                PARK_TOOL ZHOP={zhop}
            {% endif %}

            # Pass ZHOP only when there was no park (act==-1): _PICKUP_TOOL then folds
            # the hop-up into its own first XY move. RESTORE_Z drives the hop-down.
            M400
            _PICKUP_TOOL TOOL={t} TARGET={target_temp} ZHOP={0.0 if act != -1 else zhop} RESTORE_Z={restore_z} SKIP_Z_CORRECTION={params.SKIP_Z_CORRECTION|default(0)|int}

            # 8. Restore extruder current to printer.cfg value — toolchange moves use
            #    c.run_current internally; this ensures normal printing current is correct.
            _RESTORE_EXTRUDER_CURRENT

            # 9. Restore live slicer motion limits so the print resumes correctly
            SET_VELOCITY_LIMIT VELOCITY={live_vel} ACCEL={live_acc}
        {% endif %}

[gcode_macro PARK_TOOL]
gcode:
    {% set st = printer["gcode_macro _TOOLCHANGE_VARS"].toolhead_state|int %}
    {% set act = printer.save_variables.variables.active_tool|default(-1)|int %}
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set zhop = params.ZHOP|default(0.0)|float %}

    {% if act != -1 %}
        # Home if not already homed (skip when called from [homing_override])
        {% set busy = printer["gcode_macro _TOOLCHANGE_VARS"].homing_busy|default(0)|int %}
        {% if not busy and "xyz" not in printer.toolhead.homed_axes %}
            G28
        {% endif %}

        # SAFETY: Heater off before any dock approach
        M104 S0

        # Resolve this tool's dock geometry
        {% set tool = tp.tools[act] %}
        {% set dock_y = tool.dock_y %}
        {% set trigger_y = dock_y - tp.dock_dir * tp.trigger_offset %}

        {% set clearance_y = tp.clearance_y %}

        # Z-hop up is folded into this first XY move (non-blocking: simultaneous axes)
        {% set hop_z = printer.gcode_move.gcode_position.z + zhop %}
        G90
        _TC_G0 X={tool.x} Y={"%.3f"|format(clearance_y)} {% if zhop > 0 %}Z={"%.3f"|format(hop_z)}{% endif %}
        SET_GCODE_OFFSET X=0.0 Y=0.0 MOVE=1

        # High-speed sprint to trigger line
        _TC_G0 Y={"%.3f"|format(trigger_y)}
        
        {% if st == 0 %}
            _SYNC_UNLOCK_DANCE DOCK_Y={dock_y}
            SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=2
            SAVE_VARIABLE VARIABLE=toolhead_state VALUE=2
        {% else %}
            G1 Y{"%.3f"|format(dock_y)} F{c.dock_feedrate}
        {% endif %}

        M400
        _LINEAR_EXIT
        SAVE_VARIABLE VARIABLE=active_tool VALUE=-1
    {% endif %}

[gcode_macro _PICKUP_TOOL]
gcode:
    {% set t = params.TOOL|int %}
    {% set st = printer["gcode_macro _TOOLCHANGE_VARS"].toolhead_state|int %}
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set zhop = params.ZHOP|default(0.0)|float %}
    {% set restore_z = params.RESTORE_Z|default("")|string %}

    # Resolve this tool's dock geometry
    {% set tool = tp.tools[t] %}
    {% set dock_y = tool.dock_y %}
    {% set trigger_y = dock_y - tp.dock_dir * tp.trigger_offset %}

    {% set clearance_y = tp.clearance_y %}

    # When act==-1 (no park), fold the Z hop-up into this first XY move
    {% set hop_z = printer.gcode_move.gcode_position.z + zhop %}
    G90
    _TC_G0 X={tool.x} Y={"%.3f"|format(clearance_y)} {% if zhop > 0 %}Z={"%.3f"|format(hop_z)}{% endif %}
    SET_GCODE_OFFSET X=0.0 Y=0.0 MOVE=1

    # Sprint to trigger line
    _TC_G0 Y={"%.3f"|format(trigger_y)}

    # Latch moves run through INDX_EXTRUDER_MOVE so pickup works on a cold tool
    # without heating it. INDX_EXTRUDER_MOVE moves are inherently relative.
    _TC_SET_ROTATION_DIST
    G90

    {% if st != 2 %}
        # Open latch (currently locked)
        _TC_LATCH_MOVE E={c.full_open_e} F={c.latch_feedrate} I={c.run_current}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=2
        SAVE_VARIABLE VARIABLE=toolhead_state VALUE=2
    {% endif %}

    # Engagement slide to dock
    G1 Y{"%.3f"|format(dock_y)} F{c.engage_feedrate}

    # Lock the tool
    _TC_LATCH_MOVE E={c.full_lock_e} F={c.latch_feedrate} I={c.run_current}
    _TC_RESTORE_ROTATION_DIST

    # Confirm a tool is seated via latch preload before exit/heat/record.
    # SOFT=1: only set last_ok (Jinja cannot read it in this same macro after the call).
    {% if c.tool_detect_enabled|int %}
        VERIFY_TOOL_PRESENT QUIET=1 SOFT=1
    {% else %}
        SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=last_ok VALUE=1
    {% endif %}
    _PICKUP_TOOL_FINISH TOOL={t} TARGET={params.TARGET|default(0)|float} RESTORE_Z={restore_z} SKIP_Z_CORRECTION={params.SKIP_Z_CORRECTION|default(0)|int}

[gcode_macro _PICKUP_TOOL_FINISH]
description: Inner - finish pickup after lock/detect. On failed detect: unlock empty head, exit dock, then error or pause.
gcode:
    {% set t = params.TOOL|int %}
    {% set restore_z = params.RESTORE_Z|default("")|string %}
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}

    {% if vd.last_ok|int == 0 %}
        # Pickup locked but load cell saw no/low preload - unlock + exit BEFORE any
        # raise. action_raise_error runs at Jinja eval time, so it must live in a
        # follow-up macro or unlock never executes (stuck: latched tool, no active_tool).
        _TC_SET_ROTATION_DIST
        _TC_LATCH_MOVE E={c.full_open_e} F={c.latch_feedrate} I={c.run_current}
        _TC_RESTORE_ROTATION_DIST
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=2
        SAVE_VARIABLE VARIABLE=toolhead_state VALUE=2
        _LINEAR_EXIT RESTORE_Z={restore_z}
        {% set printing = printer.print_stats.state|default("") == "printing" %}
        {% if printing %}
            # Mid-print: never action_raise_error (SD treats that as print error).
            # User seats/locks T{t} by hand, then RESUME re-samples and syncs soft state.
            SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_recheck VALUE=1
            SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_tool VALUE={t}
            SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_target VALUE={params.TARGET|default(0)|float}
            RESPOND MSG="Tool detect failed mid-print. Seat and lock T{t} on the Smart Head by hand, then RESUME."
            PAUSE
        {% else %}
            _PICKUP_TOOL_DETECT_FAIL
        {% endif %}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=0
        SAVE_VARIABLE VARIABLE=toolhead_state VALUE=0

        # Z hop-down is folded into _LINEAR_EXIT's Y-clearance sprint (non-blocking)
        _LINEAR_EXIT RESTORE_Z={restore_z}
        M400

        # Apply new tool offsets.
        # Z = tool_z + global_z so the toolhead lands at the correct first-layer height.
        # The babystep widget reflects this combined value; ADJUST_GLOBAL_Z/SYNC_GLOBAL_Z
        # strip the tool_z component to expose the pure global adjustment.
        {% set svv = printer.save_variables.variables %}
        {% set tool_z = svv["t" ~ t ~ "_offset_z"]|default(0.0)|float %}
        {% set global_z = svv.global_z_offset|default(0.0)|float %}
        {% set skip_z = params.SKIP_Z_CORRECTION|default(0)|int %}
        {% set apply_z = global_z if skip_z else (tool_z + global_z) %}
        SET_GCODE_OFFSET X={svv["t"~t~"_offset_x"]|default(0.0)} Y={svv["t"~t~"_offset_y"]|default(0.0)} Z='{"%.3f"|format(apply_z)}' MOVE=1

        # Start heating only after tool is fully locked, exited dock, and offsets applied
        {% if params.TARGET|default(0)|float > 0 %}
            M104 S{params.TARGET|default(0)|float}
        {% endif %}

        # Record last - save active_tool and increment counter after physical pickup completes
        _RECORD_TOOLCHANGE TOOL={t}
    {% endif %}

[gcode_macro _PICKUP_TOOL_DETECT_FAIL]
description: Inner - raise after unlock/exit on idle pickup detect fail (must be separate macro).
gcode:
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {action_raise_error(vd.last_msg)}

#####################################################################
#  6. HELPER MACROS
#####################################################################

#####################################################################
#  Load-cell tool presence
#
#  HOW TO USE
#
#  Prerequisite (once per printer, before first Z home):
#    CALIBRATE_LOAD_CELL
#    (seat a passive tool by hand)
#    CALIBRATE_LOAD_CELL_APPLY GRAMS=1600
#    SAVE_CONFIG
#  See indx-cal.cfg "LOAD CELL CALIBRATION". Detect needs a calibrated
#  [load_cell_probe]; otherwise pickup refuses and manual VERIFY skips.
#
#  During normal printing / toolchanges - nothing to run:
#    PICKUP_TOOL already calls VERIFY_TOOL_PRESENT QUIET=1 SOFT=1 after
#    latch lock, then _PICKUP_TOOL_FINISH. Pass -> exit dock, offsets,
#    M104, fan ~30%. Fail idle -> error. Fail mid-print -> PAUSE.
#
#  Mid-print detect fail:
#    1) Seat and lock the requested tool on the Smart Head by hand
#    2) RESUME  (re-runs VERIFY; on pass syncs active_tool/offsets and
#       continues; on fail stays paused - fix seat and RESUME again)
#
#  Manual check anytime (console / UI):
#    VERIFY_TOOL_PRESENT
#      Tool locked: expect ok with absolute grams above min (~400).
#      Empty / open latch: expect fail (or error if not SOFT).
#    After G28 / bed probe: VERIFY should still look sane (stable abs
#      grams). If readings look like leftover hundreds with a good seat,
#      you are looking at raw force_g in the UI - detect uses force_g +
#      tare_force; trust VERIFY's "abs" number.
#
#  Tuning (_INDX_CONSTANTS):
#    tool_detect_enabled        1=on, 0=skip detect (always treat as ok)
#    tool_detect_min_force_g    fail below this absolute grams (default 400)
#    tool_detect_settle_ms      wait after lock before sample (default 800)
#
#  HOW IT WORKS (implementers)
#
#  Absolute force = force_g + tare_force (empty-head reference). Probe/home
#  re-tares the host cell so force_g alone drifts; do not threshold on it.
#  After settle, require |absolute| >= tool_detect_min_force_g (~400 g).
#  Cal cinch (~1600 g) is cal-only - pickup does not cinch (wear).
#
#  Two-stage: Jinja evaluates before G4 runs, so the read is in
#  _VERIFY_TOOL_PRESENT_CHECK. Pickup abort (open + _LINEAR_EXIT) lives in
#  _PICKUP_TOOL_FINISH - VERIFY only measures.
#
#  No force reading: manual VERIFY skips (ok=1 + warn). Pickup SOFT=1 fails
#  closed (ok=0) so we never heat an empty coil on a silent skip.
#
#  Fail outcomes (_PICKUP_TOOL_FINISH):
#    always: open latch + _LINEAR_EXIT first (tool returned to dock if engaged)
#    idle:  _PICKUP_TOOL_DETECT_FAIL (raise in follow-up; not same-macro Jinja)
#    print: PAUSE + pending_*; user hand-seats tool; RESUME re-samples
#
#  Manual:  VERIFY_TOOL_PRESENT
#  Pickup:  VERIFY_TOOL_PRESENT QUIET=1 SOFT=1  then  _PICKUP_TOOL_FINISH
#####################################################################

[gcode_macro VERIFY_TOOL_PRESENT]
description: Check tool seat via load-cell absolute force (force_g+tare_force). Run anytime. Pickup uses QUIET=1 SOFT=1. Mid-print fail: seat tool by hand then RESUME.
variable_last_ok: -1
variable_last_force_g: 0.0
variable_last_msg: ""
variable_quiet: 0
variable_soft: 0
variable_pending_recheck: 0
variable_pending_tool: -1
variable_pending_target: 0.0
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set quiet = params.QUIET|default(0)|int %}
    {% set soft = params.SOFT|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=quiet VALUE={quiet}
    SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=soft VALUE={soft}
    M400
    G4 P{c.tool_detect_settle_ms|int}
    _VERIFY_TOOL_PRESENT_CHECK

[gcode_macro _VERIFY_TOOL_PRESENT_CHECK]
description: Inner - read absolute force (force_g + tare_force) after settle
gcode:
    {% set c = printer["gcode_macro _INDX_CONSTANTS"] %}
    {% set v = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {% set min_g = c.tool_detect_min_force_g|float %}
    {% set ns = namespace(force=none, ok=0, msg="", force_save=0.0) %}

    # INDX Z probe is always the unnamed [load_cell_probe] section (see indx-cal.cfg).
    # absolute = force_g + tare_force restores empty-head reference after probe re-tare.
    {% if "load_cell_probe" in printer %}
        {% set lc = printer.load_cell_probe %}
        {% if lc.is_calibrated|default(false) %}
            {% set fg = lc.force_g|default(none) %}
            {% if fg is not none %}
                {% set ns.force = fg|float + (lc.tare_force|default(0.0)|float) %}
            {% endif %}
        {% endif %}
    {% endif %}

    {% if ns.force is none %}
        # fail-closed on pickup (SOFT=1); manual VERIFY still skips so cal/debug works
        {% if v.soft|int %}
            {% set ns.ok = 0 %}
            {% set ns.msg = "VERIFY_TOOL_PRESENT: no force reading - refuse pickup ([load_cell_probe] missing, uncalibrated, or force_g unavailable)" %}
        {% else %}
            {% set ns.ok = 1 %}
            {% set ns.msg = "VERIFY_TOOL_PRESENT: skipped ([load_cell_probe] missing, uncalibrated, or force_g unavailable)" %}
        {% endif %}
        # Always surface skips / soft-fails - quiet must not hide that detection is off
        RESPOND MSG="{ns.msg}"
    {% elif ns.force|abs >= min_g %}
        {% set ns.ok = 1 %}
        {% set ns.force_save = ns.force %}
        {% set ns.msg = "VERIFY_TOOL_PRESENT: ok (%.1fg abs >= %.1fg)"|format(ns.force|abs, min_g) %}
        {% if not v.quiet|int %}
            RESPOND MSG="{ns.msg}"
        {% endif %}
    {% else %}
        {% set ns.ok = 0 %}
        {% set ns.force_save = ns.force %}
        {% set ns.msg = "VERIFY_TOOL_PRESENT: no tool seated (%.1fg abs < %.1fg min). Empty dock or failed lock?"|format(ns.force|abs, min_g) %}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=last_ok VALUE={ns.ok}
    SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=last_force_g VALUE={ns.force_save}
    # VALUE='"{...}"' so literal_eval gets a quoted string when we print it.
    SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=last_msg VALUE='"{ns.msg}"'

    {% if ns.ok|int == 0 and not v.soft|int %}
        {action_raise_error(ns.msg)}
    {% endif %}

[gcode_macro RESUME]
description: Resume print. After a mid-print tool-detect PAUSE, seats must be fixed by hand first - RESUME re-runs VERIFY_TOOL_PRESENT then continues.
rename_existing: RESUME_BASE
gcode:
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {% if vd.pending_recheck|int == 1 %}
        _RESUME_PRESENCE_RECHECK
    {% else %}
        RESUME_BASE
    {% endif %}

[gcode_macro _RESUME_PRESENCE_RECHECK]
description: Inner - sample load cell after user hand-seated tool (Jinja cannot read last_ok in same macro).
gcode:
    VERIFY_TOOL_PRESENT QUIET=0 SOFT=1
    _RESUME_PRESENCE_SYNC

[gcode_macro _RESUME_PRESENCE_SYNC]
description: Inner - sync soft state on pass, stay paused on fail.
gcode:
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {% set t = vd.pending_tool|int %}
    {% if vd.last_ok|int == 1 %}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=toolhead_state VALUE=0
        SAVE_VARIABLE VARIABLE=toolhead_state VALUE=0
        {% set svv = printer.save_variables.variables %}
        {% set tool_z = svv["t" ~ t ~ "_offset_z"]|default(0.0)|float %}
        {% set global_z = svv.global_z_offset|default(0.0)|float %}
        SET_GCODE_OFFSET X={svv["t"~t~"_offset_x"]|default(0.0)} Y={svv["t"~t~"_offset_y"]|default(0.0)} Z='{"%.3f"|format(tool_z + global_z)}' MOVE=1
        {% if vd.pending_target|float > 0 %}
            M104 S{vd.pending_target|float}
        {% endif %}
        _RECORD_TOOLCHANGE TOOL={t}
        SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_recheck VALUE=0
        SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_tool VALUE=-1
        SET_GCODE_VARIABLE MACRO=VERIFY_TOOL_PRESENT VARIABLE=pending_target VALUE=0
        RESPOND MSG="Tool detect ok on resume. Continuing print with T{t}."
        RESUME_BASE
    {% else %}
        RESPOND MSG="Tool still not detected. Seat and lock T{t} on the Smart Head by hand, then RESUME again."
    {% endif %}

[gcode_macro _RECORD_TOOLCHANGE]
description: Inner — saves active_tool and increments the toolchange counter after every successful pickup
gcode:
    {% set t = params.TOOL|int %}
    SAVE_VARIABLE VARIABLE=active_tool VALUE={t}
    {% set tc_count = printer.save_variables.variables.toolchange_count|default(0)|int %}
    SAVE_VARIABLE VARIABLE=toolchange_count VALUE={tc_count + 1}

[gcode_macro TC_RESET_COUNT]
description: Reset the persistent toolchange counter to zero
gcode:
    SAVE_VARIABLE VARIABLE=toolchange_count VALUE=0
    RESPOND MSG="Toolchange counter reset to 0"

[gcode_macro TC_CYCLE_ALL]
description: Pick up and park every configured tool in order (T0→T1→…→Tn), then leave no tool loaded. Used to verify all docks engage and release cleanly.
gcode:
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set n = tp.tools|length %}
    RESPOND MSG="TC_CYCLE_ALL: cycling {n} tools..."
    {% for i in range(n) %}
        RESPOND MSG="  → picking up T{i}"
        CHANGE_TOOL TOOL={i}
        RESPOND MSG="  ← parking T{i}"
        PARK_TOOL
    {% endfor %}
    RESPOND MSG="TC_CYCLE_ALL complete — no tool loaded"

# Calibration macros are in indx-cal.cfg
