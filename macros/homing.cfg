#####################################################################
#  INDX HOMING OVERRIDE
#####################################################################
#
#  Include AFTER the other INDX macros:
#    [include indx/indx.cfg]
#    [include indx/indx-tc-macros.cfg]
#    [include indx/indx-cal.cfg]
#    [include indx/homing.cfg]
#
#  Klipper allows only ONE [homing_override]. If your printer.cfg
#  already has one (sensorless current, bed raiser, etc.), merge this
#  sequence into yours - do not include both.
#
#  Sequence (full G28):
#    1. _INDX_SAFE_Z_HOP (before any axis home)
#    2. If Z known: raise to probe_z_clearance
#    3. Home Y if needed (X always requires Y - G28 X with Y unknown
#       homes Y first)
#    4. Before X: if Y already known, clear past clearance_y when on
#       the dock side (dock_dir). Just-homed Y: home X immediately.
#    5. Home X
#    6. If Z requested: ensure a tool is seated (T0 when docks usable),
#       move to probe XY, home Z with the load cell
#
#  First Z home (Z never known): cannot dock-pick. Hand-seat and lock
#  a tool after CALIBRATE_LOAD_CELL_APPLY, then G28. Empty-head Z is
#  refused - the load cell will not trigger without a nozzle.
#
#  Sensorless XY: add your TMC current reduce/restore around the
#  G28 Y / G28 X lines if your printer needs it.
#
#  Manual check:
#    - G28 with locked tool: Y, X, Z succeed
#    - G28 Z with XY unhomed: errors
#    - G28 Z with empty head (Z never homed): errors, no bed dig
#    - G28 X Y only: no tool pickup, no Z move
#    - G28 X with Y unknown: homes Y, then homes X
#    - G28 X with Y known on dock side: clears to clearance_y, then X
#
#####################################################################

[homing_override]
axes: xyz
gcode:
    {% set home_all = not ('X' in params or 'Y' in params or 'Z' in params) %}
    {% set home_x = home_all or 'X' in params %}
    {% set home_z = home_all or 'Z' in params %}
    # X requires Y: G28 X with Y unknown homes Y first #
    {% set home_y = home_all or 'Y' in params
        or (home_x and "y" not in printer.toolhead.homed_axes) %}
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}

    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=homing_busy VALUE=1

    # 1. safe_z_home-style hop before any axis home
    _INDX_SAFE_Z_HOP

    # 2. Clear bed if Z is already known
    {% if "z" in printer.toolhead.homed_axes %}
        G90
        G0 Z{tp.probe_z_clearance|float} F600
    {% endif %}

    # 3. Home Y first (dock is usually on Y-min; X-first can sweep into tools)
    {% if home_y %}
        G28 Y
    {% endif %}

    # 4. Before X: if Y was already known, ensure clear of docks.
    # Just-homed Y: endstop is fine for X - home X immediately.
    {% if home_x %}
        {% if not home_y %}
            {% set cur_y = printer.toolhead.position.y|float %}
            {% set clear_y = tp.clearance_y|float %}
            {% if (cur_y - clear_y) * (tp.dock_dir|float) > 0 %}
                G90
                G0 Y{clear_y} F3000
            {% endif %}
        {% endif %}
        G28 X
    {% endif %}

    # 5. Z needs a seated tool (load cell = nozzle probe)
    {% if home_z %}
        _INDX_HOME_Z
    {% else %}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=homing_busy VALUE=0
    {% endif %}

[gcode_macro _INDX_SAFE_Z_HOP]
description: Inner - safe_z_home-style z_hop before any axis home
gcode:
    {% set z_hop = 5.0 %}
    {% if "z" not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z=0 SET_HOMED=Z
        G90
        G0 Z{z_hop} F900
        SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
    {% elif printer.toolhead.position.z|float < z_hop %}
        G90
        G0 Z{z_hop} F900
    {% endif %}

[gcode_macro _INDX_HOME_Z]
description: Inner - ensure tool seated, then probe Z (split for VERIFY settle)
gcode:
    {% if "xy" not in printer.toolhead.homed_axes %}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=homing_busy VALUE=0
        {action_raise_error("Must home X and Y before Z")}
    {% endif %}
    VERIFY_TOOL_PRESENT QUIET=1 SOFT=1
    _INDX_HOME_Z_AFTER_VERIFY

[gcode_macro _INDX_HOME_Z_AFTER_VERIFY]
description: Inner - dock-pick T0 when Z known and empty; else refuse empty first-Z
gcode:
    {% set vd = printer["gcode_macro VERIFY_TOOL_PRESENT"] %}
    {% set act = printer.save_variables.variables.active_tool|default(-1)|int %}
    {% set z_known = "z" in printer.toolhead.homed_axes %}

    {% if vd.last_ok|int == 1 %}
        # Tool seated. Prefer T0 when docks are usable (Z still known).
        # act == -1: hand-seated / soft-state unknown - do not dock-pick.
        {% if z_known and act > 0 %}
            CHANGE_TOOL TOOL=0
        {% endif %}
        _INDX_HOME_Z_PROBE
    {% elif z_known %}
        # Empty head but Z known - safe to dock-pick T0, then probe.
        CHANGE_TOOL TOOL=0
        _INDX_HOME_Z_PROBE
    {% else %}
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=homing_busy VALUE=0
        {action_raise_error("Cannot home Z with no tool seated. Seat and lock a tool by hand (first Z home), or home Z once then use the dock. Empty head will not trigger the load cell.")}
    {% endif %}

[gcode_macro _INDX_HOME_Z_PROBE]
description: Inner - move to probe XY and G28 Z
gcode:
    {% set tp = printer["gcode_macro TOOL_POSITIONS"] %}
    {% set th = printer.toolhead %}
    {% set px = tp.probe_x|float %}
    {% set py = tp.probe_y|float %}
    {% if px < 0 %}
        {% set px = (th.axis_minimum.x + th.axis_maximum.x) / 2 %}
    {% endif %}
    {% if py < 0 %}
        {% set py = (th.axis_minimum.y + th.axis_maximum.y) / 2 %}
    {% endif %}

    G90
    {% if "xy" in printer.toolhead.homed_axes %}
        G0 X{"%.3f"|format(px)} Y{"%.3f"|format(py)} F3000
    {% endif %}
    G28 Z
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=homing_busy VALUE=0
